<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Welcome to BuilditCraft</title>
    <!-- 現代的で洗練されたフォントを読み込み -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;500;700&family=Noto+Sans+JP:wght@300;400;500&display=swap"
        rel="stylesheet">

    <style>
        :root {
            --bg-color-1: #0f172a;
            /* 深いネイビー */
            --bg-color-2: #1e293b;
            /* 落ち着いたダークブルー */
            --text-primary: #f8fafc;
            --text-secondary: #94a3b8;
            --accent-glow: rgba(56, 189, 248, 0.15);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Outfit', 'Noto Sans JP', sans-serif;
            background: linear-gradient(135deg, var(--bg-color-1) 0%, var(--bg-color-2) 100%);
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            position: relative;
        }

        /* 背景のかすかな光の装飾 */
        .ambient-light {
            position: absolute;
            width: 60vw;
            height: 60vw;
            background: radial-gradient(circle, var(--accent-glow) 0%, transparent 70%);
            border-radius: 50%;
            top: -20vh;
            left: -10vw;
            z-index: 0;
            pointer-events: none;
        }

        .ambient-light-2 {
            position: absolute;
            width: 50vw;
            height: 50vw;
            background: radial-gradient(circle, rgba(168, 85, 247, 0.1) 0%, transparent 70%);
            border-radius: 50%;
            bottom: -20vh;
            right: -10vw;
            z-index: 0;
            pointer-events: none;
        }

        /* メインコンテナ（グラスモーフィズム） */
        .glass-container {
            position: relative;
            z-index: 1;
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 24px;
            padding: 4rem 5rem;
            text-align: center;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            opacity: 0;
            transform: translateY(30px);
            animation: fadeUp 1s cubic-bezier(0.16, 1, 0.3, 1) forwards;
            max-width: 90%;
        }

        .glass-container::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.2), transparent);
            border-radius: 24px 24px 0 0;
        }

        /* 英語タイトル */
        h1 {
            font-size: 3.5rem;
            font-weight: 700;
            letter-spacing: -0.02em;
            margin-bottom: 1rem;
            background: linear-gradient(to right, #f8fafc, #94a3b8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            opacity: 0;
            transform: translateY(20px);
            animation: fadeUpItem 0.8s cubic-bezier(0.16, 1, 0.3, 1) 0.3s forwards;
        }

        /* 日本語テキスト */
        p.subtitle {
            font-size: 1.25rem;
            font-weight: 300;
            color: var(--text-secondary);
            letter-spacing: 0.1em;
            opacity: 0;
            transform: translateY(20px);
            animation: fadeUpItem 0.8s cubic-bezier(0.16, 1, 0.3, 1) 0.5s forwards;
        }

        /* 装飾的なライン */
        .decorative-line {
            width: 0px;
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.3), transparent);
            margin: 2rem auto;
            animation: expandLine 1s cubic-bezier(0.16, 1, 0.3, 1) 0.8s forwards;
        }

        /* アニメーション定義 */
        @keyframes fadeUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fadeUpItem {
            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes expandLine {
            from {
                width: 0px;
            }

            to {
                width: 60%;
            }
        }

        /* レスポンシブ対応 */
        @media (max-width: 768px) {
            .glass-container {
                padding: 3rem 2rem;
            }

            h1 {
                font-size: 2.5rem;
            }

            p.subtitle {
                font-size: 1rem;
            }
        }
    </style>
</head>

<body>
    <!-- 背景の光の装飾 -->
    <div class="ambient-light"></div>
    <div class="ambient-light-2"></div>

    <!-- メインコンテンツ -->
    <div class="glass-container">
        <h1>Welcome to BuilditCraft</h1>
        <div class="decorative-line"></div>
        <p class="subtitle">ようこそBuilditCraftへ</p>
    </div>
</body>

</html>
